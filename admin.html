<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Celebrate You!</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .container { max-width: 980px; }
    .tabs { display: flex; gap: 8px; margin: 24px 0 0; }
    .tab-btn {
      background: var(--white); color: var(--ink-soft); border: 1px solid var(--border);
      border-bottom: none; border-radius: 8px 8px 0 0; padding: 10px 18px; cursor: pointer;
      font-weight: 600; font-size: 15px; margin-top: 0;
    }
    .tab-btn.active { background: var(--primary-light); color: var(--primary-dark); }
    .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 18px; }
    .qa-block { background: var(--bg); border-radius: 8px; padding: 12px 16px; margin: 10px 0; }
    .qa-block .q { font-weight: 600; font-size: 15px; }
    .qa-block .a { white-space: pre-line; margin-top: 4px; }
    .flag { color: var(--error); font-weight: 700; }
  </style>
</head>
<body>
  <header class="topnav">
    <div class="nav-inner">
      <a href="admin.html" class="brand">
        <svg class="brand-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20 33a13 13 0 1 1 13-13" stroke="#8a6633" stroke-width="2.6" fill="none" stroke-linecap="round"/>
          <path d="M20 27a7 7 0 1 1 7-7" stroke="#ff9c00" stroke-width="2.8" fill="none" stroke-linecap="round"/>
          <circle cx="27.5" cy="12.5" r="2.6" fill="#ff9c00"/>
        </svg>
        Celebrate You! — Admin
      </a>
      <nav>
        <a href="#" id="signout-link">Sign out</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <h1>Facilitator Dashboard</h1>
    <div id="not-admin-msg" style="display:none;" class="msg error">You're signed in, but this account isn't marked as an admin. Ask whoever set up the project to set <code>is_admin = true</code> on your profile row in Supabase.</div>

    <div id="admin-area" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" data-tab="queue">Review Queue</button>
        <button class="tab-btn" data-tab="engagement">Engagement</button>
        <button class="tab-btn" data-tab="teams">Batches &amp; Teams</button>
        <button class="tab-btn" data-tab="circles">Peer Circles</button>
      </div>

      <div class="card" style="border-top-left-radius:0;">
        <div id="tab-queue">
          <p class="small">Loading review queue…</p>
        </div>
        <div id="tab-engagement" style="display:none;">
          <p class="small">Loading engagement data…</p>
        </div>
        <div id="tab-teams" style="display:none;">
          <p class="small">Loading teams…</p>
        </div>
        <div id="tab-circles" style="display:none;">
          <p class="small">Loading peer circles…</p>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <img src="assets/proage-logo.png" alt="ProAge" />
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
