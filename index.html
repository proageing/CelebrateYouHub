<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celebrate You! — Post-Course Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container" style="max-width: 480px; padding-top: 60px;">
    <div class="center hero-lockup">
      <svg class="hero-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 33a13 13 0 1 1 13-13" stroke="#ffcb80" stroke-width="2.6" fill="none" stroke-linecap="round"/>
        <path d="M20 27a7 7 0 1 1 7-7" stroke="#ff9c00" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <circle cx="27.5" cy="12.5" r="2.6" fill="#ff9c00"/>
      </svg>
      <h1>Celebrate You!</h1>
      <p class="subtitle">Your 8-week healthy longevity follow-through hub.</p>
    </div>

    <div class="card">
      <h2>Sign in</h2>
      <p class="small">Enter the email you used to register for Celebrate You!. We'll send you a one-time login link — no password needed.</p>

      <form id="login-form">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com" />
        <button type="submit" id="login-btn">Send me a login link</button>
      </form>

      <div id="message"></div>
    </div>

    <footer class="site-footer">
      <img src="assets/proage-logo.png" alt="ProAge" />
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    // If already signed in, skip straight to the dashboard.
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "dashboard.html";
    });

    const form = document.getElementById("login-form");
    const messageEl = document.getElementById("message");
    const btn = document.getElementById("login-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      btn.disabled = true;
      btn.textContent = "Sending…";
      messageEl.innerHTML = "";

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + window.location.pathname.replace("index.html", "") + "dashboard.html" },
      });

      btn.disabled = false;
      btn.textContent = "Send me a login link";

      if (error) {
        messageEl.innerHTML = `<div class="msg error">${error.message}</div>`;
      } else {
        messageEl.innerHTML = `<div class="msg success">Check your inbox — we've sent a login link to ${email}.</div>`;
      }
    });
  </script>
</body>
</html>
